spring.application.name=gtfs-monitor
server.port=8080

gtfs.static-props.url=https://romamobilita.it/sites/default/files/rome_static_gtfs.zip
gtfs.static-props.data-dir=data/gtfs_static
gtfs.static-props.refresh-millis=3600000

gtfs.realtime.trip-updates-url=https://romamobilita.it/sites/default/files/rome_rtgtfs_trip_updates_feed.pb
gtfs.realtime.vehicle-positions-url=https://romamobilita.it/sites/default/files/rome_rtgtfs_vehicle_positions_feed.pb
gtfs.realtime.service-alerts-url=https://romamobilita.it/sites/default/files/rome_rtgtfs_service_alerts_feed.pb
gtfs.realtime.refresh-millis=5000

spring.codec.max-in-memory-size=104857600

server.compression.enabled=true
server.compression.mime-types=application/json,text/plain
server.compression.min-response-size=1024

logging.level.it.roma.gtfs.gtfs_monitor.controller=DEBUG
logging.level.it.roma.gtfs.gtfs_monitor.service.StaticGtfsUpdater=DEBUG

app.cors.allowed-origins=http://localhost:4200,http://127.0.0.1:4200,http://localhost:5173,http://127.0.0.1:5173

# OpenTripPlanner (trip planner vero). Attiva solo se hai OTP in esecuzione.
journey.otp.enabled=true
journey.otp.base-url=http://localhost:8081
journey.otp.plan-path=/routers/default/plan
